# Chilimba local infrastructure (dev)
# Brings up postgres and redis from the local Docker image cache.
#
# MinIO (S3-compatible file storage) is intentionally not included in this
# dev compose — it's only used by the POP upload feature in Week 3+, and
# its image isn't in the local cache. To add it later, append a minio +
# minio-init service block and re-run `docker compose up -d`.
#
# The Evolution API (WhatsApp) runs separately from ../evolution-api/.

services:
  postgres:
    image: postgres:15-alpine
    container_name: chilimba-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chilimba}
      POSTGRES_USER: ${POSTGRES_USER:-chilimba}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chilimba_dev}
    ports:
      - "5433:5432"   # host:container — host 5432 is taken by a native Windows Postgres
    volumes:
      - chilimba_pgdata:/var/lib/postgresql/data
    networks:
      - chilimba-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chilimba} -d ${POSTGRES_DB:-chilimba} -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chilimba-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - chilimba_redisdata:/data
    networks:
      - chilimba-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  chilimba_pgdata:
  chilimba_redisdata:

networks:
  chilimba-net:
    driver: bridge
